{% for i in sector %}
<tr onclick="onclickRowSector('{{i.idsector}}','{{a[0]}}','{{a[1]}}','{{a[3]}}','{{a[5]}}','{{i.idsector}}','{{a[4]}}','{{a[9]}}','{{orden}}.{{i.id}}','{{a[10]}}')" load="on" acc="off" class="is-pointer" id="{{i.idsector}}">
    <td>{{orden}}.{{i.id}}</td>
    <td>SECTOR: {{i.nombre}}</td>
    <td>{{ format_price(i.pia) }}</td>
    <td>{{ format_price(i.pim) }}</td>
    <td>{{ format_price(i.devengado) }}</td>
    <td>{{ format_price(i.girado) }}</td>
    <td>{{barra(i.avance)|safe}}</td>
</tr>
{% endfor %}
