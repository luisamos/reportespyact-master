{% for i in ejecutora %}
<tr onclick="onclickRowEjecutora('{{a[5]}}{{a[6]}}{{a[7]}}{{i.secejec}}','{{a[0]}}','{{a[1]}}','{{a[3]}}','{{a[5]}}','{{i.idsector}}','{{i.idpliego}}','{{i.secejec}}','{{a[4]}}','{{a[9]}}','{{a[10]}}')" load="on" acc="off" class="is-pointer" id="{{a[5]}}{{a[6]}}{{a[7]}}{{i.secejec}}">
    <td>{{orden}}.{{i.id}}</td>
    <td>EJECUTORA: {{i.nombre}}</td>
    <td>{{ format_price(i.pia) }}</td>
    <td>{{ format_price(i.pim) }}</td>
    <td>{{ format_price(i.devengado) }}</td>
    <td>{{ format_price(i.girado) }}</td>
    <td>{{barra(i.avance)|safe}}</td>
</tr>
{% endfor %}
